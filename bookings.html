<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings | GuitarTimee</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark-theme">

<nav>
    <div class="logo">GuitarTimee</div>

    <div class="nav-right">
        <select id="themeSelector" onchange="setTheme(this.value)">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="cool">Cool Colours</option>
        </select>

        <a href="#" class="student-login">Student Login</a>
    </div>
</nav>

<section class="booking-page">

    <h1>Book a Lesson</h1>

    <p style="margin-bottom:30px;">
        Complete the form below and Rafael will get back to you to arrange your lesson.
    </p>

    <form action="mailto:rtsavaris@hotmail.com" method="post" enctype="text/plain">

        <input
            type="text"
            name="name"
            placeholder="Your Name"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Your Email"
            required
        >

        <input
            type="tel"
            name="phone"
            placeholder="Phone Number (Optional)"
        >

        <select name="lesson">
            <option>Online Lesson (£15)</option>
            <option>Face-to-Face Lesson (£20)</option>
        </select>

        <input
            type="text"
            name="time"
            placeholder="Preferred Date & Time"
        >

        <textarea
            name="message"
            placeholder="Tell me about your experience level and goals"
        ></textarea>

        <button type="submit" class="btn">
            Send Booking Request
        </button>

    </form>

</section>

<footer>
    <p>© 2026 GuitarTimee</p>
</footer>

<script src="script.js"></script>

</body>
</html>
