<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuitarTimee Workspace</title>
<link rel="stylesheet" href="style.css">

<!-- LiveKit engine -->
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
</head>

<body class="dark">

<!-- NAV -->
<nav>
    <div class="logo">GuitarTimee</div>

    <div class="nav-right">
        <a href="index.html">Home</a>
        <a href="bookings.html">Bookings</a>
        <a href="workspace.html">Workspace</a>
    </div>
</nav>

<!-- HEADER -->
<section>
    <h1>Lesson Workspace</h1>
    <p>Enter your details to join your private lesson room.</p>
</section>

<!-- JOIN BOX -->
<section>

<div class="card">

    <h3>Join Lesson</h3>

    <!-- Workspace selector -->
    <select id="workspace">
        <option value="A">Workspace A</option>
        <option value="B">Workspace B</option>
    </select>

    <!-- identity -->
    <input id="identity" placeholder="Your name (Student / Rafael)" />

    <!-- room code -->
    <input id="code" placeholder="Lesson code (e.g. GTA-2468)" />

    <button class="btn" onclick="joinRoom()">Join Room</button>

</div>

</section>

<!-- VIDEO AREA -->
<section>

<div id="videoGrid" style="
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
"></div>

</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 GuitarTimee</p>
</footer>

<!-- LIVEKIT LOGIC -->
<script>

const LIVEKIT_URL = "wss://guitartimee-mmfb38lm.livekit.cloud";

async function joinRoom() {

    const workspace = document.getElementById("workspace").value;
    const identity = document.getElementById("identity").value;
    const code = document.getElementById("code").value;

    if (!identity || !code) {
        alert("Please enter name and code");
        return;
    }

    const roomName = workspace + "-" + code;

    // 1. Get token from Supabase Edge Function
    const res = await fetch(
        "https://mroebgbkpieancxnpckx.functions.supabase.co/livekit-token",
        {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                room: roomName,
                identity: identity
            })
        }
    );

    const data = await res.json();

    if (!data.token) {
        alert("Failed to get token");
        return;
    }

    const token = data.token;

    // 2. Connect to LiveKit
    const { Room, createLocalTracks } = LivekitClient;

    const room = new Room();

    await room.connect(LIVEKIT_URL, token);

    const videoGrid = document.getElementById("videoGrid");

    // 3. Publish local camera + mic
    const tracks = await createLocalTracks({
        audio: true,
        video: true
    });

    for (const t of tracks) {
        room.localParticipant.publishTrack(t);
    }

    // 4. Attach local video
    tracks.forEach(track => {
        const el = track.attach();
        videoGrid.appendChild(el);
    });

    // 5. Attach remote participant tracks
    room.on("trackSubscribed", (track) => {
        const el = track.attach();
        videoGrid.appendChild(el);
    });

}

</script>

</body>
</html>
