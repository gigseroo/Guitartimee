<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<nav>
<div class="logo">GuitarTimee</div>

<div class="nav-right">
<a href="index.html">Home</a>
<a href="bookings.html">Bookings</a>
<a href="workspace.html">Workspace</a>

<select id="themeSelector" onchange="setTheme(this.value)">
<option value="dark">Dark</option>
<option value="light">Light</option>
<option value="cool">Cool Colours</option>
</select>
</div>
</nav>

<section>

<h1>Lesson Workspace</h1>

<div class="workspace">

<video id="video" autoplay playsinline></video>

<div id="overlay">
<h2>Enter Lesson Code</h2>
<input id="codeInput" type="password" placeholder="Enter code">
<button onclick="unlock()">Unlock</button>
</div>

</div>

</section>

<footer>
<p>© 2026 GuitarTimee</p>
</footer>

<script src="script.js"></script>

<script>
navigator.mediaDevices.getUserMedia({ video: true, audio: true })
.then(stream => {
document.getElementById("video").srcObject = stream;
});

function unlock(){
const code = document.getElementById("codeInput").value;
if(code === "2468"){
document.getElementById("overlay").style.display = "none";
document.getElementById("video").style.filter = "none";
}
}
</script>

</body>
</html>
